name: reminders

# Vercel Hobby caps crons at daily; this workflow handles the every-5-minutes
# /api/cron/reminders ping. GitHub schedules at 5-min minimum and may slip
# 5-10 minutes under load — that's acceptable for personal-task reminders.
#
# Required repo configuration:
#   - Variable  STUFF_BASE_URL   e.g. https://stuff.your-domain.com
#                                (Settings → Secrets and variables → Actions → Variables)
#   - Secret    CRON_SECRET      same value as the Vercel env var; must match
#                                (Settings → Secrets and variables → Actions → Secrets)

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping /api/cron/reminders
        env:
          BASE_URL: ${{ vars.STUFF_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$BASE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "STUFF_BASE_URL var or CRON_SECRET secret is not set"
            exit 1
          fi
          curl --fail --silent --show-error \
            --max-time 30 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${BASE_URL}/api/cron/reminders"
